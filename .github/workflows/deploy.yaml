name: Deploy Quartz to GitHub Pages
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clone Obsidian vault content
        uses: actions/checkout@v4
        with:
          repository: FDogeLover/Obsidian
          path: vault-content
          token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build --directory vault-content
      - name: Generate search suggestions index
        run: |
          python3 scripts/build-wiki-index.py vault-content \
            --light-output public/wiki-index-light.json
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          CHANGED_IDS_OUT: /tmp/changed-ids.json
        run: |
          python3 scripts/build-wiki-index.py vault-content \
            --light-output worker/wiki-index-light.json \
            --full-output worker/wiki-data-full.json \
            -o worker/wiki-data.json
          python3 scripts/upload-to-kv.py worker/wiki-data-full.json
          npx wrangler deploy --config worker/wrangler.toml
      - name: Generate and upload embeddings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          # 增量嵌入：只对本次变化条目（upload-to-kv 写出的 id 列表）重算向量
          COUNT=$(python3 scripts/filter-changed.py worker/wiki-data-full.json /tmp/changed-ids.json /tmp/changed-data.json)
          echo "本次需嵌入变化条目: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "无变化条目，跳过嵌入与向量更新"
          else
            pip install dashscope
            python3 vault-content/scripts/build-embeddings.py /tmp/changed-data.json -o embeddings.json
            python3 scripts/embeddings-to-ndjson.py embeddings.json /tmp/embeddings.ndjson
            cd worker && npx wrangler vectorize upsert wiki-embeddings --file=/tmp/embeddings.ndjson
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::构建失败，请检查 Actions 日志"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::部署失败，请检查 Actions 日志"
