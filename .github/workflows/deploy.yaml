name: Deploy Quartz to GitHub Pages
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clone Obsidian vault content
        uses: actions/checkout@v4
        with:
          repository: FDogeLover/Obsidian
          path: vault-content
          token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build --directory vault-content
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          python3 scripts/build-wiki-index.py vault-content \
            --light-output worker/wiki-index-light.json \
            --full-output worker/wiki-data-full.json \
            -o worker/wiki-data.json
          cd worker && python3 ../scripts/upload-to-kv.py wiki-data-full.json
          npx wrangler deploy
      - name: Copy monitoring dashboard
        run: |
          mkdir -p public/monitoring
          cp -r monitoring/* public/monitoring/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::构建失败，请检查 Actions 日志"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::部署失败，请检查 Actions 日志"
