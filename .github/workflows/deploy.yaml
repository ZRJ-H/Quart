name: Deploy Quartz to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build wiki search index
        run: |
          python3 scripts/build-wiki-index.py content \
            --light-output /tmp/wiki-index-light.json \
            --full-output /tmp/wiki-data-full.json \
            -o /tmp/wiki-data.json

      - name: Build Quartz
        run: npx quartz build --directory content

      - name: Add search suggestions index
        run: cp /tmp/wiki-index-light.json public/wiki-index-light.json

      - name: Sync Cloudflare search backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CF_API_TOKEN is not configured; skip Cloudflare KV upload and Worker deploy."
            exit 0
          fi
          cp /tmp/wiki-index-light.json worker/wiki-index-light.json
          cp /tmp/wiki-data-full.json worker/wiki-data-full.json
          cp /tmp/wiki-data.json worker/wiki-data.json
          python3 scripts/upload-to-kv.py worker/wiki-data-full.json
          npx wrangler deploy --config worker/wrangler.toml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
