name: Collect GitHub Trending

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fetch GitHub Trending data
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/github_trending.py --period daily --limit 25 --json --output /tmp/trending.json

      - name: Generate notes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GO_API_KEY: ${{ secrets.GO_API_KEY }}
        run: node scripts/generate-github-trending.js

      - name: Commit and push notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --staged --quiet || git commit -m "docs: GitHub Trending $(date +%F)"
          git push
