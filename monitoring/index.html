<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki 监控仪表板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Wiki 监控仪表板</h1>
      <p class="subtitle">实时监控状态</p>
    </header>

    <section class="status-section">
      <h2>当前状态</h2>
      <div class="status-grid" id="current-status">
        <div class="status-card loading">
          <div class="status-icon">⏳</div>
          <div class="status-name">加载中...</div>
        </div>
      </div>
    </section>

    <section class="events-section">
      <h2>最近事件</h2>
      <div class="events-list" id="events-list">
        <div class="event-item loading">加载中...</div>
      </div>
    </section>

    <footer>
      <p>数据来源：UptimeRobot | 更新时间：<span id="last-update">--</span></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
